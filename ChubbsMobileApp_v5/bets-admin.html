<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Chubbs Bets · Admin</title>
  <meta name="theme-color" content="#07150f" />
  <link rel="icon" href="./ChubbsGatorIcon.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="./ChubbsGatorIcon.png" />
  <style>
    :root{
      --bg:#07150f; --bg2:#0c2017; --card:#10261c; --card2:#163526;
      --line:rgba(255,255,255,0.08); --line2:rgba(214,176,90,0.35);
      --text:#f4efe2; --muted:#a8b8ad;
      --gold:#d6b05a; --gold2:#f2dd97;
      --green:#2aa36a; --red:#d16b5d; --blue:#79b0e3;
      --shadow:0 16px 40px rgba(0,0,0,0.34);
    }
    *{box-sizing:border-box}
    html,body{margin:0;padding:0;
      background:
        radial-gradient(circle at top, rgba(214,176,90,0.10), transparent 28%),
        linear-gradient(180deg,#05110c 0%,#0b1d15 100%);
      color:var(--text);font-family:Inter,Segoe UI,Arial,sans-serif;
      -webkit-font-smoothing:antialiased;
    }
    body{min-height:100vh}
    .wrap{max-width:560px;margin:0 auto;padding:14px 14px 80px}
    header{padding:14px 16px;border:1px solid var(--line2);
      background:linear-gradient(180deg,rgba(214,176,90,0.10),rgba(16,38,28,0.92));
      border-radius:18px;box-shadow:var(--shadow);text-align:center;margin-bottom:14px}
    header h1{margin:0;font-family:Georgia,serif;font-size:18px;color:var(--gold2);letter-spacing:.02em}
    header .sub{margin-top:3px;font-size:11px;color:var(--muted);letter-spacing:.08em;text-transform:uppercase}
    .totals{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-top:10px}
    .tot{background:var(--card2);border:1px solid var(--line);border-radius:10px;padding:8px 6px;text-align:center}
    .tot .n{font-size:20px;font-weight:800;color:var(--gold2);font-family:Georgia,serif}
    .tot .k{font-size:10px;color:var(--muted);letter-spacing:.06em;text-transform:uppercase;margin-top:2px}
    .row{background:var(--card);border:1px solid var(--line);border-radius:12px;
      padding:10px 12px;margin-bottom:8px;display:flex;align-items:center;justify-content:space-between;gap:10px}
    .row.paid{border-color:rgba(42,163,106,0.45);background:rgba(42,163,106,0.06)}
    .row .who{flex:1;min-width:0}
    .row .name{font-weight:800;font-size:15px;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .row .ts{font-size:10px;color:var(--muted);margin-top:2px}
    .btn{padding:9px 14px;border-radius:10px;border:1px solid var(--line);
      font-size:12px;font-weight:800;letter-spacing:.04em;cursor:pointer;font-family:inherit;
      background:transparent;color:var(--muted);min-width:96px;text-align:center}
    .btn.paid{background:var(--green);color:#0a1810;border-color:var(--green)}
    .btn.unpaid{background:#3d1a1a;color:#ffb5ae;border-color:#5c2020}
    .btn:active{transform:scale(0.98)}
    input[type=password],input[type=text],select{
      width:100%;padding:11px 12px;border-radius:10px;border:1px solid var(--line);
      background:var(--bg2);color:var(--text);font-size:15px;font-family:inherit;
    }
    .card{background:var(--card);border:1px solid var(--line);border-radius:14px;
      padding:14px;margin-bottom:12px;box-shadow:var(--shadow)}
    .card .title{font-size:12px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;
      color:var(--gold2);margin-bottom:8px}
    .hint{font-size:11px;color:var(--muted);line-height:1.5;margin-top:6px}
    .status{padding:10px 12px;border-radius:10px;font-size:12px;margin:8px 0}
    .status.err{background:rgba(209,107,93,0.10);border:1px solid rgba(209,107,93,0.35);color:#ffb5ae}
    .status.ok{background:rgba(42,163,106,0.10);border:1px solid rgba(42,163,106,0.35);color:#a5f0c5}
    .toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);
      background:var(--card2);border:1px solid var(--line2);padding:10px 18px;
      border-radius:24px;font-size:13px;color:var(--gold2);
      box-shadow:var(--shadow);opacity:0;transition:opacity 0.3s;pointer-events:none;z-index:99}
    .toast.show{opacity:1}
    .toolbar{display:flex;gap:8px;margin-bottom:12px}
    .toolbar button{flex:1;padding:10px;border-radius:10px;background:var(--card2);
      border:1px solid var(--line);color:var(--text);font-weight:700;font-size:12px;cursor:pointer}
    .empty{text-align:center;color:var(--muted);padding:40px 20px;font-size:13px;line-height:1.6}
    details{background:var(--card2);border:1px solid var(--line);border-radius:10px;
      padding:8px 12px;margin-top:8px;font-size:11px}
    details summary{cursor:pointer;color:var(--muted);font-weight:600}
    details .picks-detail{margin-top:8px;line-height:1.5;color:var(--text)}
    .pick-line{margin:3px 0}
    .pick-line .label{color:var(--muted);font-size:10px;letter-spacing:.04em;text-transform:uppercase;margin-right:6px}
  </style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>🎰 Chubbs Bets · Admin</h1>
    <div class="sub" id="event-id">Loading…</div>
    <div class="totals" id="totals" style="display:none">
      <div class="tot"><div class="n" id="t-submitted">0</div><div class="k">Submitted</div></div>
      <div class="tot"><div class="n" id="t-paid">0</div><div class="k">Paid</div></div>
      <div class="tot"><div class="n" id="t-unpaid">0</div><div class="k">Unpaid</div></div>
    </div>
  </header>

  <div id="content"></div>
</div>
<div class="toast" id="toast"></div>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
<script>
const FIREBASE_CONFIG = {
  apiKey:            "AIzaSyBbuOgOICrb_nt64fCdfOMY-Nn1ySDKIu4",
  authDomain:        "chubbs-golf.firebaseapp.com",
  databaseURL:       "https://chubbs-golf-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId:         "chubbs-golf",
  storageBucket:     "chubbs-golf.firebasestorage.app",
  messagingSenderId: "462454481032",
  appId:             "1:462454481032:web:6ddc74ffb7ff543f3b3f3d"
};
firebase.initializeApp(FIREBASE_CONFIG);
const db = firebase.database();
const FB = FIREBASE_CONFIG.databaseURL;

let EVENT_ID = null;
let SECRET   = null;
let PLAYER_NAMES = {}; // pid -> displayName

const params = new URLSearchParams(location.search);

async function boot(){
  // Admin writes /chubbs/currentEvent as { eventId, displayName, ts,
  // publishedBy } rather than a bare string. Unwrap to get the id.
  EVENT_ID = params.get('event');
  if(!EVENT_ID){
    const cur = await fb_get_public('chubbs/currentEvent');
    if(cur && typeof cur === 'object' && cur.eventId) EVENT_ID = cur.eventId;
    else if(typeof cur === 'string') EVENT_ID = cur;
  }
  if(!EVENT_ID){
    showError("No event ID — pass ?event=YOUR-EVENT-ID or set /chubbs/currentEvent.");
    return;
  }
  document.getElementById('event-id').textContent = EVENT_ID;

  // URL ?secret=… wins, then sessionStorage, then prompt
  SECRET = params.get('secret') || sessionStorage.getItem('chubbs_db_secret') || null;
  if(!SECRET){
    renderSecretPrompt();
    return;
  }
  // Cache for subsequent reloads within this tab session
  sessionStorage.setItem('chubbs_db_secret', SECRET);
  // Strip secret from URL so it doesn't sit in the address bar
  if(params.get('secret')){
    params.delete('secret');
    history.replaceState({}, '', location.pathname + (params.toString() ? '?' + params.toString() : ''));
  }

  // Preload player display names from the event bundle (used to render picks)
  try {
    const bsnap = await db.ref(`events/${EVENT_ID}/bundle/players`).once('value');
    const players = bsnap.val() || [];
    players.forEach(p => { PLAYER_NAMES[p.playerId] = p.displayName || p.fullName || p.playerId; });
  } catch(e){}

  await loadBets();
}

function renderSecretPrompt(){
  document.getElementById('content').innerHTML = `
    <div class="card">
      <div class="title">🔑 Admin secret required</div>
      <div class="hint">Paste the Firebase database secret (Console → Project Settings → Service Accounts → Database secrets). Stays in this tab only.</div>
      <input type="password" id="secret-input" placeholder="Database secret" autocomplete="off" style="margin-top:10px" />
      <button class="btn paid" style="width:100%;margin-top:10px" onclick="onSecretSubmit()">Unlock</button>
      <div id="secret-error"></div>
    </div>`;
  document.getElementById('secret-input').focus();
}

async function onSecretSubmit(){
  const s = (document.getElementById('secret-input').value || '').trim();
  if(!s){ document.getElementById('secret-error').innerHTML = '<div class="status err">Empty secret</div>'; return; }
  // Validate by trying a read
  const test = await fb_get_auth(`bets/${EVENT_ID}`, s);
  if(test && test.__error){
    document.getElementById('secret-error').innerHTML = `<div class="status err">${escapeHtml(test.__error)}</div>`;
    return;
  }
  SECRET = s;
  sessionStorage.setItem('chubbs_db_secret', s);
  await loadBets();
}

async function loadBets(){
  const bets = await fb_get_auth(`bets/${EVENT_ID}`, SECRET);
  if(bets && bets.__error){
    showError(bets.__error);
    sessionStorage.removeItem('chubbs_db_secret');
    SECRET = null;
    renderSecretPrompt();
    return;
  }
  renderBets(bets || {});
}

function renderBets(bets){
  const entries = Object.entries(bets).filter(([k]) => !k.startsWith('_'));
  entries.sort((a,b) => (b[1].submittedAtMs||0) - (a[1].submittedAtMs||0));

  const submitted = entries.length;
  const paid      = entries.filter(([_,v]) => v.paid).length;
  const unpaid    = submitted - paid;
  document.getElementById('totals').style.display = 'grid';
  document.getElementById('t-submitted').textContent = submitted;
  document.getElementById('t-paid').textContent      = paid;
  document.getElementById('t-unpaid').textContent    = unpaid;

  if(entries.length === 0){
    document.getElementById('content').innerHTML = `
      <div class="toolbar">
        <button onclick="loadBets()">↻ Refresh</button>
        <button onclick="logoutSecret()">🔒 Lock</button>
      </div>
      <div class="empty">
        No bets submitted yet.<br/><br/>
        Share the form link to start collecting picks:<br/>
        <code style="user-select:all;color:var(--gold2);font-size:11px">
          ${location.origin}/bets.html?event=${escapeHtml(EVENT_ID)}
        </code>
      </div>`;
    return;
  }

  const rows = entries.map(([pid, b]) => {
    const ts = b.submittedAt ? new Date(b.submittedAt).toLocaleString() : '?';
    const isPaid = !!b.paid;
    const picksHtml = renderPicksDetail(b);
    return `
      <div class="row ${isPaid?'paid':''}" id="row-${escapeHtml(pid)}">
        <div class="who">
          <div class="name">${escapeHtml(b.punter || pid)} ${isPaid ? '✓' : ''}</div>
          <div class="ts">${escapeHtml(ts)}</div>
          <details><summary>View picks</summary><div class="picks-detail">${picksHtml}</div></details>
        </div>
        <button class="btn ${isPaid?'paid':'unpaid'}" onclick="togglePaid('${escapeHtml(pid)}', ${!isPaid})">
          ${isPaid ? '✓ Paid' : 'Mark paid'}
        </button>
      </div>`;
  }).join('');

  document.getElementById('content').innerHTML = `
    <div class="toolbar">
      <button onclick="loadBets()">↻ Refresh</button>
      <button onclick="logoutSecret()">🔒 Lock</button>
    </div>
    ${rows}`;
}

function renderPicksDetail(b){
  const n = pid => PLAYER_NAMES[pid] || pid || '—';
  const r16 = b.r16 || [];
  const lines = [];
  for(let gi = 0; gi < r16.length; gi++){
    const picks = r16[gi] || [];
    const placements = picks.map((pid, i) => `${i+1}. ${n(pid)}`).join(' · ');
    lines.push(`<div class="pick-line"><span class="label">R16 G${gi+1}:</span>${placements || '(empty)'}</div>`);
  }
  lines.push(`<div class="pick-line"><span class="label">🥇 Gold:</span>${n(b.gold)}</div>`);
  lines.push(`<div class="pick-line"><span class="label">🤡 Clown:</span>${n(b.clown)}</div>`);
  lines.push(`<div class="pick-line"><span class="label">🔥 Fireball best (TB):</span>${n(b.fireballBest)}</div>`);
  lines.push(`<div class="pick-line"><span class="label">🥄 Fireball worst (TB):</span>${n(b.fireballWorst)}</div>`);
  return lines.join('');
}

async function togglePaid(pid, paid){
  // Optimistic UI update
  const btn = event.target;
  btn.disabled = true;
  btn.textContent = '…';
  try {
    await db.ref(`bets/${EVENT_ID}/${pid}/paid`).set(!!paid);
    if(paid){
      await db.ref(`bets/${EVENT_ID}/${pid}/paidAt`).set(new Date().toISOString());
    } else {
      await db.ref(`bets/${EVENT_ID}/${pid}/paidAt`).remove();
    }
    toast(paid ? `Marked paid · ${pid}` : `Unmarked · ${pid}`);
    await loadBets();
  } catch(e){
    toast('Error: ' + (e.message || e), 'err');
    btn.disabled = false;
  }
}

function logoutSecret(){
  sessionStorage.removeItem('chubbs_db_secret');
  SECRET = null;
  renderSecretPrompt();
}

// ── Firebase REST helpers (legacy database-secret auth) ──────────────────
async function fb_get_public(path){
  try {
    const snap = await db.ref(path).once('value');
    return snap.val();
  } catch(e){ return null; }
}
async function fb_get_auth(path, secret){
  // Uses the legacy ?auth=SECRET pattern — works for the database-secret
  // token. The compat SDK doesn't expose this directly, so we hit REST.
  //
  // cache:'no-store' + a ts query param defeat both the HTTP cache and any
  // CDN edge that might key on the URL+secret combination. Without this
  // bust, a tab that loaded before a new submission would keep showing
  // the stale snapshot even after tapping Refresh.
  const url = `${FB}/${path}.json?auth=${encodeURIComponent(secret)}&_ts=${Date.now()}`;
  try {
    const res = await fetch(url, { cache: 'no-store' });
    if(!res.ok){
      const body = await res.text();
      return { __error: `HTTP ${res.status}: ${body.slice(0, 200)}` };
    }
    return await res.json();
  } catch(e){
    return { __error: String(e.message || e) };
  }
}

// ── UI helpers ───────────────────────────────────────────────────────────
function showError(msg){
  document.getElementById('content').innerHTML =
    `<div class="status err"><strong>Error:</strong> ${escapeHtml(msg)}</div>`;
}
function escapeHtml(s){
  return String(s == null ? '' : s).replace(/[&<>"']/g, c => ({
    '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;'
  }[c]));
}
function toast(msg, kind){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

boot();
</script>
</body>
</html>
